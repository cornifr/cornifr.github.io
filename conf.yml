pageInfo:
  title: Cornifr Dashboard
  description: My personal links and bookmarks
  navLinks:
    - title: GitHub
      path: https://github.com
    - title: Docs
      path: https://dashy.to/docs
  footerText: ""

appConfig:
  theme: dracula
  layout: auto
  iconSize: medium
  language: en
  webSearch:
    enable: true
    searchEngine: duckduckgo

sections:
  - name: Quick Links
    icon: fas fa-link
    displayData:
      sortBy: default
      cols: 2
      rows: 2
    items:
      - title: GitHub
        description: Where the world builds software
        url: https://github.com
        icon: fab fa-github
      - title: Reddit
        description: The front page of the internet
        url: https://reddit.com
        icon: fab fa-reddit
      - title: YouTube
        description: Watch and share videos
        url: https://youtube.com
        icon: fab fa-youtube

  - name: Dev Tools
    icon: fas fa-code
    displayData:
      sortBy: default
      cols: 2
      rows: 2
    items:
      - title: Stack Overflow
        description: Developer Q&A
        url: https://stackoverflow.com
        icon: fab fa-stack-overflow
      - title: DevDocs
        description: API documentation browser
        url: https://devdocs.io
        icon: fas fa-book
      - title: CodePen
        description: Online code editor
        url: https://codepen.io
        icon: fab fa-codepen
